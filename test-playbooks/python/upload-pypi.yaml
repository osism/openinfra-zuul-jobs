- hosts: all
  vars:
    venv_dir: "{{ ansible_user_dir }}/.venv"
    _devpi_port: 3141
    _devpi_url: "http://localhost:{{ _devpi_port }}"
    _devpi_user: "zuul"
    _devpi_index: "test"
    _package_name: "sandbox"
    _package_version: "{{ ansible_date_time.epoch }}"

  tasks:
    - name: Generate random password
      no_log: true
      set_fact:
        _devpi_password: "{{ lookup('password', '/dev/null length=16') }}"

    - name: Ensure pip works for ensure-twine
      include_role:
        name: ensure-pip

    - name: Install twine
      include_role:
        name: ensure-twine

    # Install and configure devpi as a local PyPI server
    - name: Install devpi-server
      pip:
        name:
          - devpi-server
          - devpi-client
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: "{{ ensure_pip_virtualenv_command }}"
        state: present

    - name: Create devpi server directory
      file:
        path: "{{ ansible_user_dir }}/.devpi"
        state: directory
        mode: '0755'

    - name: Initialize devpi server
      command: "{{ venv_dir }}/bin/devpi-init --serverdir {{ ansible_user_dir }}/.devpi"
      args:
        creates: "{{ ansible_user_dir }}/.devpi/.nodeinfo"

    - name: Start devpi server  # noqa command-instead-of-shell
      shell: |
        nohup {{ venv_dir }}/bin/devpi-server --serverdir {{ ansible_user_dir }}/.devpi \
          --host 127.0.0.1 --port {{ _devpi_port }} \
          > {{ ansible_user_dir }}/devpi-server.log 2>&1 &
        echo $!
      register: _devpi_pid

    - name: Wait for devpi server to start
      uri:
        url: "{{ _devpi_url }}"
        status_code: 200
      register: _devpi_status
      until: _devpi_status.status == 200
      retries: 30
      delay: 1

    - name: Create a test user and an index
      block:
        - name: Log in as root user
          command: "{{ item }}"
          loop:
            - "{{ venv_dir }}/bin/devpi use {{ _devpi_url }}"
            - "{{ venv_dir }}/bin/devpi login root --password=''"

        - name: Create and login into test user
          no_log: true
          command: "{{ item }}"
          loop:
            - "{{ venv_dir }}/bin/devpi user -c {{ _devpi_user }} password='{{ _devpi_password }}'"
            - "{{ venv_dir }}/bin/devpi login {{ _devpi_user }} --password='{{ _devpi_password }}'"

        - name: Create the test index
          command: "{{ venv_dir }}/bin/devpi index -c {{ _devpi_index }} bases=root/pypi"

    - name: Create package directory
      file:
        path: "{{ ansible_user_dir }}/{{ _package_name }}"
        state: directory
        mode: '0755'

    - name: Create setup.py
      copy:
        dest: "{{ ansible_user_dir }}/{{ _package_name }}/setup.py"
        mode: '0644'
        content: |
          import setuptools
          setuptools.setup(
              name='{{ _package_name }}',
              version='{{ _package_version }}',
              author='Zuul',
              author_email='author@example.com',
              description='A test package for upload-pypi role testing',
              py_modules=['{{ _package_name }}'],
          )

    - name: Create package module
      copy:
        dest: "{{ ansible_user_dir }}/{{ _package_name }}/{{ _package_name }}.py"
        mode: '0644'
        content: |
          """A simple test module."""

          def hello():
              return "Hello from {{ _package_name }}!"

    - name: Install build tools for wheel creation
      pip:
        name:
          - wheel
          - setuptools
        virtualenv: "{{ venv_dir }}"
        virtualenv_command: "{{ ensure_pip_virtualenv_command }}"
        state: present

    - name: Build package wheel
      command: "{{ venv_dir }}/bin/python3 -m pip wheel . --no-deps -w dist"
      args:
        chdir: "{{ ansible_user_dir }}/{{ _package_name }}"

    - name: Upload package to devpi
      include_role:
        name: upload-pypi
      vars:
        pypi_info:
          username: "{{ _devpi_user }}"
          password: "{{ _devpi_password }}"
          repository: devpi
          repository_url: "{{ _devpi_url }}/{{ _devpi_user }}/{{ _devpi_index }}"
        pypi_path: "{{ ansible_user_dir }}/{{ _package_name }}/dist"

    # Cleanup
    - name: Stop devpi server
      command: kill {{ _devpi_pid.stdout }}
      failed_when: false

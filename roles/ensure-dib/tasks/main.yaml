- name: Make sure the role is run on Debian or Ubuntu
  fail:
    msg: "This role supports Debian and Ubuntu distributions only"
  when: ansible_distribution not in ["Debian", "Ubuntu"]

- name: Install diskimage-builder requirements
  become: true
  package:
    state: present
    name:
      # these deps are taken from the upstream
      # openstack/diskimage-builder/bindep.txt
      - apt-transport-https
      - curl
      - debootstrap
      - dosfstools
      - gdisk
      - git
      - gnupg2
      - inetutils-ping
      - kpartx
      - qemu-utils
      - rpm
      - squashfs-tools
      - sudo
      - uuid-runtime
      - zstd

- name: Install dnf and dnf download
  when: ansible_distribution_release != "focal"
  block:
    - name: Install dnf
      become: true
      package:
        state: present
        name: dnf

    # There is a Debian package for dnf-plugins-core but it breaks and replaces
    # zypper which we also want to install. Prior to dnf-plugins-core existing
    # in Debian we fetched the content we needed from github. Continue doing
    # that but pin the version for compatibility with Debian's dnf.
    # Until Debian fixes its dnf-plugins-core package in bookworm; manually
    # install "dnf download" for the yum-minimal element. Note version 4.4.4
    # is the last version compatible with bookworm's dnf package.
    - name: Install dnf download
      shell: |
          set -x
          git clone --depth 1 --branch 4.4.4 https://github.com/rpm-software-management/dnf-plugins-core
          mkdir /usr/lib/python3/dist-packages/dnf-plugins
          cp -r dnf-plugins-core/plugins/dnfpluginscore /usr/lib/python3/dist-packages
          cp dnf-plugins-core/plugins/download.py /usr/lib/python3/dist-packages/dnf-plugins
          rm -rf dnf-plugins-core
          echo 'pluginpath=/usr/lib/python3/dist-packages/dnf-plugins' >> /etc/dnf/dnf.conf
      args:
        executable: /bin/bash
      become: yes
      when: ansible_os_family == 'Debian'

- name: Check if diskimage-builder is installed
  shell: >
    command -v {{ ensure_dib_venv_dir }}/bin/disk-image-create
      disk-image-create
  args:
    executable: /bin/bash
  register: dib_preinstalled
  ignore_errors: true

- name: Export preinstalled dib executable
  when: dib_preinstalled is successful
  set_fact:
    ensure_dib_command: "{{ dib_preinstalled.stdout_lines[0] }}"
    cacheable: true

- name: Install dib in venv
  when: dib_preinstalled is not successful
  block:
    - name: Ensure pip
      include_role:
        name: ensure-pip
    - name: Install latest diskimage-builder
      when: (not ensure_dib_version) and zuul['projects']['opendev.org/openstack/diskimage-builder'] is not defined
      pip:
        name:
          - setuptools
          - diskimage-builder
        virtualenv: "{{ ensure_dib_venv_dir }}"
        virtualenv_command: "{{ ensure_pip_virtualenv_command }}"
    - name: Install diskimage-builder from source
      when: (not ensure_dib_version) and zuul['projects']['opendev.org/openstack/diskimage-builder'] is defined
      pip:
        name:
          - setuptools
          - "{{ ansible_user_dir}}/{{ zuul['projects']['opendev.org/openstack/diskimage-builder']['src_dir'] }}"
        virtualenv: "{{ ensure_dib_venv_dir }}"
        virtualenv_command: "{{ ensure_pip_virtualenv_command }}"
    - name: Install versioned diskimage-builder
      when: ensure_dib_version
      pip:
        name:
          - setuptools
          - "diskimage-builder=={{ ensure_dib_version }}"
        virtualenv: "{{ ensure_dib_venv_dir }}"
        virtualenv_command: "{{ ensure_pip_virtualenv_command }}"
    - name: Export DIB binary path
      set_fact:
        ensure_dib_command: "{{ ensure_dib_venv_dir }}/bin/disk-image-create"
        cacheable: true
